name: Desktop Build

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: Test and dependency audit
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Run frontend verification suite
        working-directory: apps/desktop
        run: npm test

      - name: Audit production JavaScript dependencies
        working-directory: apps/desktop
        run: npm audit --omit=dev --audit-level=high

  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            artifact: bookmind-windows
          - name: macOS
            os: macos-latest
            artifact: bookmind-macos
          - name: Linux
            os: ubuntu-22.04
            artifact: bookmind-linux

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Verify frontend build
        working-directory: apps/desktop
        run: npm run build

      - name: Verify Rust targets
        working-directory: apps/desktop/src-tauri
        run: cargo check --all-targets

      - name: Build native bundle
        working-directory: apps/desktop
        run: npm run tauri:build

      - name: Generate bundle checksums
        shell: pwsh
        run: |
          $bundleDir = 'apps/desktop/src-tauri/target/release/bundle'
          Get-ChildItem $bundleDir -File -Recurse |
            Get-FileHash -Algorithm SHA256 |
            ForEach-Object { "{0}  {1}" -f $_.Hash.ToLower(), $_.Path.Substring((Resolve-Path '.').Path.Length + 1) } |
            Set-Content -Encoding ascii "$bundleDir/SHA256SUMS.txt"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: apps/desktop/src-tauri/target/release/bundle/
          if-no-files-found: error
